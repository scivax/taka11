        document.getElementById('connect').addEventListener('click', async () => {
            try {
                // デバイスの選択
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [SERVICE_UUID] }]
                });

                // サーバーへの接続
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                const characteristic = await service.getCharacteristic(CHAR_UUID);

                // 通知の開始
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', (event) => {
                    const value = new TextDecoder().decode(event.target.value);
                    drawBall(value);

//                    document.getElementById('data').innerText = value;
                    document.getElementById('outputArea').innerText = value;
               });
            } catch (error) {
                console.log(error);
            }
        });

        var bufferLine = 20;
        var textBuff = new Array(bufferLine);
        textBuff.fill("");
        function addSerial(msg) {
            for (var i = bufferLine - 1; i > 0; i--) {
                textBuff[i] = textBuff[i-1];
            }
            textBuff[0] = msg;
            var textarea = document.getElementById('outputArea');
            textarea.value = "";
            for (var i = bufferLine - 1; i >= 0; i--) {
                textarea.value += textBuff[i];
            }
             textarea.scrollTop = textarea.scrollHeight;
        }

        function drawBall(dat) {

             console.log (dat);
 
            if (dat != "P") {
                int n=0;
                return;
            }

            ctx2.clearRect(0, 0, canvasElem2.width, canvasElem2.height);

            ctx2.drawImage(img, 0, 0, canvasElem2.width, canvasElem2.height);

          if (n=0)     {drawBallOne(0,  dat);}
          else if (n=1){drawBallOne(1,  dat);}
          else if (n=2){drawBallOne(2,  dat);}
          else if (n=3){drawBallOne(3,  dat);}
          else if (n=4){drawBallOne(4,  dat);}
          else if (n=5){drawBallOne(5,  dat);}
          else if (n=6){drawBallOne(6,  dat);}
          else if (n=7){drawBallOne(7,  dat);}
        }

        function drawBallOne(id, val) {

            var minIr = 95000;
            var maxIr = 140000;
            var rangeIr = maxIr - minIr;
            var maxRadius = 50;

            //////////
            ctx2.font = "22px Helvetica";

            var cx, cy;

            var radius = Math.trunc((val - minIr) * maxRadius / rangeIr);
            if (radius < 0 ) radius = 0;					//20250903 suzuki
//            var col = radius * 3;
            var col = radius * 1;
            if (col > 255) col = 255;

            if (id == 0) {
                ctx2.strokeStyle = "rgb(0 255 0)";
                ctx2.fillStyle = "rgb(0 " + col + " 0)";
                cx = 100;
                cy = 360;
            }
            else if (id == 1) {
                ctx2.strokeStyle = "rgb(0 255 0)";
                ctx2.fillStyle = "rgb(0 " + col + " 0)";
                cx = 100;
                cy = 380;
            }
            else if (id == 2) {
                ctx2.strokeStyle = "rgb(0 255 0)";
                ctx2.fillStyle = "rgb(0 " + col + " 0)";
                cx = 100;
                cy = 400;
            }
            else if (id == 3) {
                ctx2.strokeStyle = "rgb(0 255 0)";
                ctx2.fillStyle = "rgb(0 " + col + " 0)";
                cx = 100;
                cy = 420;
            }
            else if (id == 4) {
                ctx2.strokeStyle = "rgb(0 255 0)";
                ctx2.fillStyle = "rgb(0 " + col + " 0)";
                cx = 120;
                cy = 360;
            }
            else if (id == 5) {
                ctx2.strokeStyle = "rgb(0 255 0)";
                ctx2.fillStyle = "rgb(0 " + col + " 0)";
                cx = 120;
                cy = 380;
            }
            else if (id == 6) {
                ctx2.strokeStyle = "rgb(0 255 0)";
                ctx2.fillStyle = "rgb(0 " + col + " 0)";
                cx = 120;
                cy = 400;
            }
            else if (id == 7) {
                ctx2.strokeStyle = "rgb(0 255 0)";
                ctx2.fillStyle = "rgb(0 " + col + " 0)";
                cx = 120;
                cy = 420;
            }

//            console.log(radius);


            ctx2.beginPath();
            ctx2.arc(cx, cy, radius, 0, 2 * Math.PI);
            ctx2.closePath();
            ctx2.fill();

        }
